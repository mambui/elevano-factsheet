services:
  - type: cron
    name: elevano-factsheet
    runtime: python
    schedule: "0 1 * * *"
    buildCommand: pip install -r requirements.txt
    startCommand: python generate.py
    envVars:
      - key: BYBIT_API_KEY
        sync: false
      - key: BYBIT_API_SECRET
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
